async function openPresensi(sheet){
  showLoading("Memuat data presensi...");
  const res=await fetch(`${SCRIPT_URL}?sheet=${sheet}`);
  const data=await res.json();
  if(data.error)return showOverlay("<p style='color:red'>"+data.error+"</p>");
  const headers=data.headers||[];
  const passForm=`
    <div><label>Password Kelas</label>
    <input type='password' id='presPass' class='input' placeholder='Masukkan password kelas'></div>`;
  let html=`<h3>Isi Presensi — ${sheet}</h3>${passForm}<form id='formPresensi'>`;
  headers.forEach(h=>{
    html+=`<div><b>${h}</b><br>
    <select name='${h}' class='input'>
      <option>Hadir</option><option>Sakit</option><option>Izin</option>
      <option>Alfa</option><option>Cabut</option></select></div>`;
  });
  html+=`</form><div style='margin-top:10px'>
  <button class='action-save' onclick="submitPresensi('${sheet}')">Kirim</button>
  <button class='action-del' onclick="closeOverlay()">Batal</button></div>`;
  showOverlay(html);
}

async function submitPresensi(sheet){
  const pass=document.getElementById("presPass").value.trim();
  const res=await fetch(`${SCRIPT_URL}?sheet=${sheet}`);
  const d=await res.json();
  if(d.classPassword!==pass){
    alert("❌ Password kelas salah!");
    return;
  }
  const form=document.getElementById("formPresensi");
  const entries={}; for(let el of form.elements){if(el.name)entries[el.name]=el.value;}
  const body={action:"addPresensi",kelas:sheet,password:pass,entries};
  const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(body)});
  const j=await r.json();
  if(j.ok){
    alert("✅ Presensi tersimpan");
    closeOverlay();
  } else {
    // Tampilkan pesan error dari backend, termasuk jika sudah presensi hari ini
    alert("❌ Gagal: "+(j.error || "Terjadi kesalahan"));
  }
}

/* === FORMAT TIMESTAMP → DD/MM/YYYY === */
function formatTanggal(value) {
  const d = new Date(value);
  if (isNaN(d)) return value;

  const dd = d.getDate().toString().padStart(2,"0");
  const mm = (d.getMonth()+1).toString().padStart(2,"0");
  const yyyy = d.getFullYear();

  return `${dd}/${mm}/${yyyy}`;
}

/* === LIHAT DATA MENTAH (kolom Password disembunyikan) === */
async function showRawData(sheet) {
  showLoading("Memuat data mentah...");

  try {
    const res = await fetch(`${SCRIPT_URL}?sheet=${sheet}&action=all`);
    const d = await res.json();
    const rows = d.values || [];

    if (rows.length < 1) {
      showOverlay(`<h3>${sheet}</h3><p>Belum ada data.</p>`);
      return;
    }

    const headers = rows[0];
    const data = rows.slice(1);

 const passIndex = headers.findIndex(h =>
  h.toString().toLowerCase().replace(/\s+/g,'').includes("pass")
);


    let html = `<h3>📄 Data Mentah — ${sheet}</h3>`;

    /* 🔥 WRAPPER FREEZE */
    html += `<div class="table-freeze-wrapper raw-full">

               <table class="table">
                 <thead><tr>`;

    headers.forEach((h,i)=>{
      if(i!==passIndex) html += `<th>${h}</th>`;
    });

    html += `</tr></thead><tbody>`;

    data.forEach(row=>{
      html += `<tr>`;
     row.forEach((cell,i)=>{
  if(i !== passIndex){

    if(headers[i].toLowerCase().includes("timestamp")){
      html += `<td>${formatTanggal(cell)}</td>`;
    } else {
      html += `<td>${cell}</td>`;
    }

  }
});

      html += `</tr>`;
    });

    html += `</tbody></table></div>`;
    html += `

`;


    html += `<div style="margin-top:10px;text-align:right">
               <button class="action-del" onclick="closeOverlay()">Tutup</button>
             </div>`;

    showOverlay(html);
  } catch (err) {
    showOverlay(`<p style="color:red">Gagal memuat data mentah: ${err.message}</p>`);
  }
}

/* === EDIT DATA MENTAH === */
async function openEditRaw(sheet) {
  showLoading("Memuat data mentah...");

  const res = await fetch(`${SCRIPT_URL}?sheet=${sheet}&action=all`);
  const d = await res.json();
  const rows = d.values || [];

  if (rows.length < 2) {
    alert("Data kosong");
    return;
  }

  window._rawHeaders = rows[0];
  window._rawRows = rows.slice(1);
  window._rawByMonth = {};

  window._rawRows.forEach((row, i) => {
    const dt = new Date(row[0]);
    if (isNaN(dt)) return;
    const key = `${dt.getFullYear()}-${dt.getMonth()}`;
    if (!window._rawByMonth[key]) window._rawByMonth[key] = [];
    window._rawByMonth[key].push({ row, index: i });
  });

  let html = `
    <h3>✏️ Edit Data Mentah — ${sheet}</h3>

    <label style="font-weight:600">📅 Pilih Bulan:</label>
    <select id="editBulan" class="input" onchange="renderEditTable()">
      <option value="ALL">Semua</option>
    </select>

    <div class="table-freeze-wrapper raw-full">
      <table class="table">
        <thead><tr>
          ${window._rawHeaders.map(h=>`<th>${h}</th>`).join("")}
        </tr></thead>
        <tbody id="editTbody"></tbody>
      </table>
    </div>

    <div style="text-align:right;margin-top:10px">
      <button class="action-save" onclick="saveEditedRaw('${sheet}')">
        💾 Simpan Perubahan
      </button>
    </div>
  `;

  showOverlay(html);

  const sel = document.getElementById("editBulan");
  Object.keys(window._rawByMonth).sort().forEach(k=>{
    const [y,m]=k.split("-");
    const nm=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"][m];
    sel.insertAdjacentHTML("beforeend",
      `<option value="${k}">${nm} ${y}</option>`);
  });

  setTimeout(renderEditTable, 50);
}




 /*simpan*/
async function saveEditedRaw(sheet) {
  const edits = [...document.querySelectorAll(".cellEdit")].map(el => ({
  rowIndex: parseInt(el.dataset.r) + 2, // 🔥 +2 karena data mulai baris 3
  colIndex: parseInt(el.dataset.c) + 1, // 🔥 spreadsheet 1-based
  value: el.value
}));


  if (!confirm("Simpan semua perubahan ke Google Sheet?")) return;

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "editRawData",
      kelas: sheet,
      edits
    })
  });

  const j = await res.json();

  if (j.ok) {
    alert("✅ Data berhasil diperbarui");
    closeOverlay();

    // 🔥 PENTING: reload rekap dari server
    setTimeout(() => openRekap(sheet), 300);
  } else {
    alert("❌ Gagal: " + (j.error || "Tidak diketahui"));
  }
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;

  const doc = new jsPDF("p","mm","a4");
  const pageWidth = doc.internal.pageSize.getWidth();

  /* ===== AMBIL DATA RINGKASAN ===== */
  const totalSiswa = document.getElementById("ringTotalSiswa")?.innerText || "0";
  const totalPertemuan = document.getElementById("ringTotalPertemuan")?.innerText || "0";
  const rata = document.getElementById("ringRataKehadiran")?.innerText || "0%";

  /* ===== JUDUL ===== */
  const title = document.getElementById("rekapJudul")?.innerText || "Rekap Kehadiran";
  const sub   = document.getElementById("rekapSubJudul")?.innerText || "";

  doc.setFontSize(14);
  doc.setTextColor(0);
  doc.text(title, pageWidth/2, 14, {align:"center"});

  doc.setFontSize(10);
  doc.text(sub, pageWidth/2, 20, {align:"center"});

  /* ===== CARD RINGKASAN (PUTIH + BORDER) ===== */
  let yCard = 26;
  const cardW = 55;
  const cardH = 20;
  const gap = 6;
  const startX = (pageWidth - (cardW*3 + gap*2)) / 2;

  doc.setDrawColor(180);
  doc.setFillColor(255,255,255);
  doc.setTextColor(0);

  function drawCard(x, title, value){
    doc.rect(x, yCard, cardW, cardH); // TANPA FILL MODE
    doc.setFontSize(9);
    doc.text(title, x + cardW/2, yCard + 7, {align:"center"});
    doc.setFontSize(13);
    doc.text(value.toString(), x + cardW/2, yCard + 15, {align:"center"});
  }

  drawCard(startX, "Total Siswa", totalSiswa);
  drawCard(startX + cardW + gap, "Total Pertemuan", totalPertemuan);
  drawCard(startX + (cardW + gap)*2, "Rata-rata Kehadiran", rata);

  /* ===== DATA TABEL ===== */
  const head = [[
    "No","Nama Lengkap","Hadir","Sakit","Izin","Alfa","Cabut","% Kehadiran"
  ]];

  const body = [];
  document.querySelectorAll(".rekap-row").forEach(tr=>{
    const row = [];
    tr.querySelectorAll("td").forEach(td=>{
      row.push(td.innerText.trim());
    });
    body.push(row);
  });

  doc.autoTable({
    startY: yCard + cardH + 8,
    head: head,
    body: body,
    theme: "grid",
    styles: {
      fontSize: 8,
      halign: "center",
      valign: "middle",
      cellPadding: 2
    },
    headStyles: {
      fillColor: [240,240,240],
      textColor: 0,
      fontSize: 9
    },
    columnStyles:{
      0:{cellWidth:8},
      1:{cellWidth:45},
      2:{cellWidth:15},
      3:{cellWidth:15},
      4:{cellWidth:15},
      5:{cellWidth:15},
      6:{cellWidth:15},
      7:{cellWidth:20}
    },
    didParseCell(data){
      if(data.column.index === 7){
        const v = parseFloat(data.cell.raw);
        if(v < 50) data.cell.styles.textColor = [200,0,0];
        else if(v < 70) data.cell.styles.textColor = [200,140,0];
        else data.cell.styles.textColor = [0,140,70];
      }
    }
  });

  /* ===== WATERMARK KANAN BAWAH ===== */
  const pageH = doc.internal.pageSize.getHeight();
  doc.setFontSize(8);
  doc.setTextColor(150);
  doc.text(
    "diunduh dari tjktsmkn1telukkuantan.web.id",
    pageWidth - 10,
    pageH - 8,
    { align:"right" }
  );

  doc.save("Rekap-Kehadiran-A4-Potrait.pdf");
}

function renderEditTable(){
  const bulan = document.getElementById("editBulan").value;
  const tbody = document.getElementById("editTbody");
  tbody.innerHTML = "";

  const sumber = bulan==="ALL"
    ? window._rawRows.map((r,i)=>({row:r,index:i}))
    : window._rawByMonth[bulan] || [];

  sumber.forEach(({row,index})=>{
    let tr = "<tr>";
    row.forEach((cell,c)=>{
      if(c>=2){
        tr += `<td>
          <select class="input cellEdit" data-r="${index}" data-c="${c}">
            <option ${cell==="Hadir"?"selected":""}>Hadir</option>
            <option ${cell==="Sakit"?"selected":""}>Sakit</option>
            <option ${cell==="Izin"?"selected":""}>Izin</option>
            <option ${cell==="Alfa"?"selected":""}>Alfa</option>
            <option ${cell==="Cabut"?"selected":""}>Cabut</option>
          </select>
        </td>`;
      } else {
        tr += `<td>${c===0?formatTanggal(cell):cell}</td>`;
      }
    });
    tr += "</tr>";
    tbody.insertAdjacentHTML("beforeend", tr);
  });
}
